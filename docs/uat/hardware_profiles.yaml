# docs/uat/hardware_profiles.yaml
profiles:
  - id: "Laptop-Gaming"
    description: "High-end gaming laptop"
    specs:
      cpu: "i7-12700H or equivalent"
      gpu: "RTX 3060/4060 Mobile"
      ram: "16GB+"
      os: "Windows 11"
    required: true

  - id: "Desktop-Workstation"
    description: "Heavy installation rig"
    specs:
      cpu: "i9 / Ryzen 9"
      gpu: "RTX 4090"
      ram: "64GB"
      os: "Windows 11 / Ubuntu"
    required: true

  - id: "Linux-Laptop"
    description: "Standard Linux development/performance machine"
    specs:
      cpu: "i7 / Ryzen 7"
      gpu: "RTX 3060+"
      ram: "32GB"
      os: "Ubuntu 22.04 LTS"
    required: false
