version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.production
    image: vjlive3:prod
    container_name: vjlive-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    volumes:
      - ./config:/app/config:ro
      - ./data:/app/data
      - ./logs:/app/logs
    environment:
      - ENVIRONMENT=production
      - LOG_LEVEL=INFO
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: '2.0'
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:5000/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
    security_opt:
      - no-new-privileges:true
